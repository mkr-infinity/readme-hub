    <!-- GitHub Pages SPA routing: decode the path encoded by 404.html -->
    <script>
      (function() {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
        // Also handle ?p= style redirect from 404.html
        var search = window.location.search;
        if (search.indexOf('?p=/') === 0 || search.indexOf('&p=/') > -1) {
          var params = search.slice(1).split('&').reduce(function(o, s) {
            var kv = s.split('=');
            o[kv[0]] = kv.slice(1).join('=').replace(/~and~/g, '&');
            return o;
          }, {});
          if (params.p !== undefined) {
            var url = location.pathname.slice(0, -1) + (params.p || '') +
              (params.q ? '?' + params.q : '') + (location.hash || '');
            window.history.replaceState(null, null, url);
          }
        }
      })();
    </script>
  </head>
  <body class="dark">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
