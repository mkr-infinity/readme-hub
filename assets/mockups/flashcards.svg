<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="500" rx="24" fill="#0F172A"/>
  
  <!-- Flashcard -->
  <g>
    <rect x="200" y="100" width="400" height="300" rx="20" fill="#FFFFFF">
      <animateTransform attributeName="transform" type="rotate" values="0 400 250; 5 400 250; 0 400 250; -5 400 250; 0 400 250" dur="6s" repeatCount="indefinite" />
    </rect>
    <text x="400" y="240" font-family="sans-serif" font-size="32" font-weight="bold" fill="#1E293B" text-anchor="middle">What is Photosynthesis?</text>
    <text x="400" y="280" font-family="sans-serif" font-size="16" fill="#64748B" text-anchor="middle">Tap to flip</text>
  </g>
  
  <!-- Controls -->
  <circle cx="300" cy="440" r="30" fill="#EF4444" fill-opacity="0.2" stroke="#EF4444" stroke-width="2"/>
  <path d="M290 430 L310 450 M310 430 L290 450" stroke="#EF4444" stroke-width="4" stroke-linecap="round"/>
  
  <circle cx="500" cy="440" r="30" fill="#10B981" fill-opacity="0.2" stroke="#10B981" stroke-width="2"/>
  <path d="M490 440 L497 447 L510 433" stroke="#10B981" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  
  <rect x="350" y="40" width="100" height="8" rx="4" fill="#334155"/>
  <rect x="350" y="40" width="60" height="8" rx="4" fill="#6366F1"/>
</svg>
